name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Registry (ghcr.io or docker.io)'
        required: true
        default: 'ghcr.io'
      username:
        description: 'Registry username'
        required: true
      password:
        description: 'Registry password/token'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ github.inputs.registry }}
          username: ${{ github.inputs.username }}
          password: ${{ github.inputs.password }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ github.inputs.registry }}/${{ github.inputs.username }}/webcrawl:latest
            ${{ github.inputs.registry }}/${{ github.inputs.username }}/webcrawl:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max