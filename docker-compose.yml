version: '3.9'

services:
  web-crawler:
    build: .
    container_name: web-crawler-agent
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    labels:
      - traefik.enable=true
      - traefik.http.routers.webcrawl.rule=Host(`webcrawl.agnxxt.com`)
      - traefik.http.routers.webcrawl.entrypoints=http
      - traefik.http.services.webcrawl.loadbalancer.server.port=8501
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3